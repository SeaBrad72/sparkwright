# Kit-own ratification — Sparkwright dogfooding the DEVELOPMENT-PROCESS.md §13 separation-of-duties
# gate on itself, and NOTHING ELSE. (The adopter REFERENCE copy lives at
# profiles/typescript-node/ratification.yml and is inert here.)
#
# The "Kit-own … Sparkwright" wording is not decoration: scripts/incept.sh::cp_kit_replace will only
# overwrite a destination that carries a kit marker, so that inception never clobbers a real adopter's
# workflow in a brownfield repo. Without a marker here, incept refuses to replace this file, the adopter
# silently keeps the KIT's internal workflow instead of the reference one, and every parity lock passes
# while pointing at the wrong file. (That is exactly what happened — caught in review, not by the locks.)
#
# WHY ITS OWN FILE (CP-9). The gate must re-run when a human approves the PR, otherwise the approval
# lands and the check stays stale at its pre-approval verdict — the human ratifies and the gate never
# notices. That needs a `pull_request_review` trigger. Adding one to ci.yml would re-run the ENTIRE
# suite (tests, conformance, artifact-gate, semgrep) on every review event; guarding each job with an
# `if:` would work only until someone adds a job and forgets the guard. Splitting the gate into its own
# workflow makes "a review re-runs the gate and nothing else" STRUCTURAL rather than remembered.
# This is protection-safe: the required status context is the POSTED CHECK-RUN NAME
# (`control-plane-ratification`), not the workflow or job name, so moving the job does not orphan it.
#
# WHY YELLOW, NOT RED (CP-9). This gate is the one check that goes non-green while working perfectly:
# "a human hasn't approved yet" is a WAITING state, not a broken build. It used to post an
# action-required conclusion, which GitHub renders with the same red ✗ as a failure — so a correctly
# functioning gate read as "the build is broken", and a team that sees red for normal operation learns
# to ignore red. It now posts `status: in_progress` with NO conclusion: yellow, and — because a required
# check that is not `success` still blocks — it keeps blocking the merge natively, with NO
# branch-protection change. Witnessed, not assumed: probe PR #305 observed `mergeStateStatus: BLOCKED`
# with an approval already present, and green only once the check flipped to `success`.
# Red is now RESERVED for rc=2 — the gate genuinely could not evaluate the diff.
name: Ratification

on:
  pull_request:
  pull_request_review:
    # An approval IS the ratification signal, so every event that can add, change, or REVOKE one must
    # re-evaluate the gate — `dismissed` included, so a withdrawn approval returns the check to yellow.
    types: [submitted, edited, dismissed]

permissions:
  contents: read

jobs:
  gate-agent-boundary:
    # H1.4 + D4 + CP-9 — the kit dogfoods its own §13 governance gate and presents ratification as a
    # MERGE-GATE (a distinct, still-blocking `control-plane-ratification` check), not a red CI failure.
    # The job exits 0; the posted check-run carries the state. Decision logic (agent-boundary.sh's
    # rc 0/1/2 contract) is UNCHANGED by CP-9 — only how that verdict is rendered.
    runs-on: ubuntu-latest
    # The review re-trigger is deliberately restricted to SAME-REPO pull requests. Defense in depth: the
    # base-tree checkout below is the primary control, and this is the second, independent one.
    #
    # WHY. `pull_request` from a fork gets a READ-ONLY token regardless of the permissions block — that
    # is what makes the fork-PR contract fail-closed today (the check simply never posts, stays ABSENT,
    # and an absent required check BLOCKS the merge). `pull_request_review` is in the family of events
    # that can run in the BASE-repo context, where the token may be WRITABLE even for a fork PR. That
    # would be a behaviour change for fork PRs (their gate could suddenly post), and it puts a
    # `checks: write` token one mistake away from any future edit that reintroduces a PR-head checkout.
    # Community reports say the token is read-only here too; GitHub's own security reference does not say
    # so either way, and a governance gate's integrity is not something to rest on an unverified claim.
    # So we do not ask the question: a fork PR never reaches the review-triggered path. It keeps the
    # `pull_request` gate it already had (which already cannot post), so this costs a fork PR nothing.
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_review' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      pull-requests: read
      checks: write
    steps:
      # ★ THE GATE IS ADJUDICATED FROM THE BASE TREE — IT NEVER CHECKS OUT OR EXECUTES PR-HEAD CODE.
      #
      # This job runs the gate's own logic (conformance/agent-boundary.sh, promotion-readiness.sh, and
      # the guard-core deny-matrix they source) and holds `checks: write`. If it checked out the PR head,
      # it would be RUNNING CODE THE PR UNDER TEST CONTROLS while holding the token that posts that PR's
      # verdict. Two ways that ends badly, and neither needs a fork:
      #   1. A PR rewrites conformance/agent-boundary.sh so the mapping always says `success`, then its
      #      author submits a COMMENTED review on their own PR (GitHub forbids self-APPROVAL but permits
      #      a self-comment-review, and it fires pull_request_review) -> the gate re-runs, executes the
      #      PR's mapping, and posts its own green. The agent ratifies itself.
      #   2. A PR neuters `is_control_plane_path` in .claude/hooks/guard-core.sh -> boundary_decide finds
      #      no control-plane paths in the diff -> rc=0 -> `success`. The gate declares the very change
      #      that disarms it to be nothing to ratify.
      # Checking out the BASE commit makes the adjudicating code the TRUSTED copy — the one already on
      # main, which a human already ratified. A PR cannot weaken the gate that is judging it.
      #
      # It also makes the *listing* head-independent: it comes from the PR files API below, not from a
      # git diff of a working tree. That removes the whole class of "which ref did we check out"
      # failures (a review event's default ref is the BASE branch, so a head-relative `git diff` there
      # returns EMPTY -> no control-plane paths -> rc=0 -> GREEN on an unratified PR) rather than
      # patching it, and it moots `github.base_ref` being undefined on review events.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - name: Compute changed files (from the PR files API — never from the PR's own tree)
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # `set -e` is on: a failed API call aborts the step -> the job fails -> the required check is
          # never posted -> it stays ABSENT -> the merge is BLOCKED. Fail-closed, by construction.
          gh api "repos/${REPO}/pulls/${PR}/files" --paginate -q '.[].filename' > /tmp/changed.txt
          echo "changed files seen by the gate:"
          cat /tmp/changed.txt
      - name: Compute ratification signal (non-author approval)
        id: ratify
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          rat=0
          # Ratification = a non-author APPROVAL (an agent cannot approve its own PR; GitHub forbids
          # self-approval). The self-appliable `ratified-control-plane` label was REMOVED (H1.3) as
          # agent-forgeable; solo maintainers ratify via a logged enforce_admins:false admin-merge.
          # Guard the review read inside an `if !` so a failing command substitution cannot trip
          # set -e and abort the step. FAIL CLOSED: an unreadable review list is NOT an approval —
          # rat stays 0 (unratified), approvers reset to "" so the grep below sees an empty list.
          # `map(last)` takes each author's most recent review OF ANY STATE — but a COMMENTED review does
          # not supersede an APPROVED one in GitHub's own semantics. Without the filter below, the
          # sequence "approve, then leave a comment" reads back as UNRATIFIED, parking the check at
          # yellow forever and pushing the maintainer toward an --admin override — i.e. the bug would
          # push people AWAY from separation-of-duties. Latent before CP-9 (reviews never re-ran the
          # gate); live the moment they do. Keep only the states that actually carry a verdict.
          if ! approvers=$(gh pr view "$PR" --json reviews \
              -q '.reviews
                  | map(select(.state=="APPROVED" or .state=="CHANGES_REQUESTED" or .state=="DISMISSED"))
                  | group_by(.author.login) | map(last) | .[]
                  | select(.state=="APPROVED") | .author.login'); then
            echo "control-plane-ratification: could not read reviews (gh pr view rc != 0) — treating as UNRATIFIED."
            approvers=""
          fi
          # A non-empty match must be a NON-whitespace line: `grep -q .` also matches a line of
          # spaces/tabs (the `.` matches a space), which would count a whitespace-only line as an
          # approver (rat=1). Unreachable via real data (GitHub logins carry no whitespace; a deleted
          # author renders as the literal `null`), but strictly NARROWING to fix — it can only move a
          # verdict toward unratified, never toward ratified. The `grep -vxF -- "$AUTHOR"` keeps its
          # fixed-string / whole-line / `--` hardening against a hostile author login.
          if printf '%s\n' "$approvers" | grep -vxF -- "$AUTHOR" | grep -q '[^[:space:]]'; then rat=1; fi
          echo "ratified=$rat" >> "$GITHUB_OUTPUT"
      - name: Ratification merge-gate (waiting is yellow, not red)
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # CI= cleared so agent-boundary keeps its true three-state (CI would escalate 2->1):
          #   0 = ratified / no control-plane change · 1 = unratified control-plane · 2 = cannot evaluate.
          set +e
          CI= sh conformance/agent-boundary.sh --changed /tmp/changed.txt --ratified "${{ steps.ratify.outputs.ratified }}"
          rc=$?
          set -e
          # [F2, second line of defense.] Every real PR changes at least one file. So an EMPTY listing
          # never means "no control-plane paths to ratify" — it means the gate could not SEE the diff
          # (wrong checkout ref, bad base, failed fetch). Left alone, that reads as rc=0 and posts GREEN
          # on an unratified control-plane PR. Force it to rc=2 (a genuine, red, gate error) so the
          # fail-open is closed STRUCTURALLY, not by trusting the `ref:` pin above to never rot.
          if [ ! -s /tmp/changed.txt ]; then
            echo "control-plane-ratification: the changed-file listing is EMPTY. A pull request always changes at least one file, so this is a gate ERROR (the diff could not be computed), NOT an absence of control-plane changes. Escalating rc -> 2 (fail-closed)."
            rc=2
          fi
          state=$(CI= sh conformance/agent-boundary.sh --changed /tmp/changed.txt \
                    --ratified "${{ steps.ratify.outputs.ratified }}" --state 2>/dev/null || echo NONE)
          class=$(sh conformance/promotion-readiness.sh --class --no-verify \
                    --changed /tmp/changed.txt 2>/dev/null || echo control-plane)
          # reconcile displayed class with the gate verdict: the gate (state) is union-aware and is the
          # authority on control-plane-ness; the guard-core-only --class can under-detect adapter-declared
          # paths (e.g. AGENTS.md) or over-fail-safe on an empty diff. Never let the surface contradict itself.
          if [ "$state" != NONE ]; then class=control-plane
          elif [ "$class" = control-plane ]; then class=sensitive
          fi
          # The rc -> (status, conclusion, title, summary) mapping lives in agent-boundary.sh, where it is
          # --selftest-able and mutation-tested. Inline YAML cannot be unit-tested, and this mapping IS
          # the slice. rc=1 comes back as status=in_progress with a DELIBERATELY EMPTY conclusion.
          CI= sh conformance/agent-boundary.sh --conclusion "$rc" \
                --for-state "$state" --for-class "$class" > /tmp/mapping.txt
          status=""; concl=""; title=""; summary=""
          # Read via a file, not a heredoc: a heredoc terminator inside an indented YAML block scalar
          # has to sit at column 0 to close, which is a trap that only shows up at runtime.
          while IFS='=' read -r k v; do
            case "$k" in
              status) status=$v ;;
              conclusion) concl=$v ;;
              title) title=$v ;;
              summary) summary=$v ;;
            esac
          done < /tmp/mapping.txt
          if [ -z "$status" ]; then
            echo "control-plane-ratification: the rc->check-run mapping returned no status. Refusing to post a check-run we cannot characterise — the required check stays ABSENT, which BLOCKS the merge (fail-closed)."
            exit 1
          fi
          # Post the check-run under set +e. On a FORK pull_request the GITHUB_TOKEN is read-only
          # REGARDLESS of this job's permissions block, so checks:write is downgraded and this POST
          # returns non-zero (403). That must NOT redden the build — this job documents itself as
          # exit-0-regardless. But we do not pretend the post succeeded either: we name what happened.
          # Why this is FAIL-CLOSED, not fail-open: a check-run that never posts is a REQUIRED check
          # that stays ABSENT, and an absent required check BLOCKS the merge. An unposted gate never
          # lets an unratified control-plane PR through — it only withholds the green until the check
          # can post (e.g. on a same-repo PR with a writable token). Failing here would be strictly
          # worse: same blocked merge, plus a spurious red build and failure email.
          # UPDATE the existing check-run for this SHA if there is one, else create it. Every event
          # (open, push, review) re-evaluates the gate, and a fresh POST each time leaves the previous
          # `in_progress` runs hanging FOREVER — they are never completed. Branch protection reads the
          # latest, so it is not a correctness bug, but a slice whose entire purpose is "the signal must
          # say what is actually true" cannot leave a stack of permanent yellow spinners on the PR.
          set +e
          run_id=$(gh api "repos/${{ github.repository }}/commits/${SHA}/check-runs" \
                     -q '.check_runs[] | select(.name=="control-plane-ratification") | .id' 2>/dev/null | head -1)
          if [ -n "$run_id" ]; then
            method=PATCH; endpoint="repos/${{ github.repository }}/check-runs/${run_id}"
          else
            method=POST;  endpoint="repos/${{ github.repository }}/check-runs"
          fi
          if [ -n "$concl" ]; then
            gh api -X "$method" "$endpoint" \
              -f name='control-plane-ratification' \
              -f head_sha="$SHA" \
              -f status="$status" \
              -f conclusion="$concl" \
              -f 'output[title]'="$title" \
              -f 'output[summary]'="$summary"
          else
            # The WAITING check-run. `-f conclusion=""` is NOT the same as omitting the field — GitHub
            # would take the empty string as a conclusion and COMPLETE the check, which renders red: the
            # exact bug this slice removes. The two calls are spelled out rather than assembled by
            # splicing an argument string (which would word-split on the summary's spaces).
            gh api -X "$method" "$endpoint" \
              -f name='control-plane-ratification' \
              -f head_sha="$SHA" \
              -f status="$status" \
              -f 'output[title]'="$title" \
              -f 'output[summary]'="$summary"
          fi
          api_rc=$?
          set -e
          if [ "$api_rc" -ne 0 ]; then
            echo "control-plane-ratification: the check-run could not be posted (gh api rc=$api_rc). On a fork pull_request this is EXPECTED — GITHUB_TOKEN is read-only there regardless of the job's permissions block, so checks:write is downgraded. The required 'control-plane-ratification' check will simply never post, which BLOCKS the merge rather than allowing it (fail-closed)."
          fi
          echo "control-plane-ratification => status=$status conclusion=${concl:-<none: waiting on a human>} (rc=$rc, class=$class, state=$state, api_rc=$api_rc)"
          # The job exits 0 regardless of the posted state AND of api_rc — the check-run, or its
          # absence, carries the verdict. A governance gate must never emit a red build for doing its job.
