name: golden-path
# G2 — run the reference adopter artifacts END-TO-END (npm pipeline + docker build + liveness).
# Heavy + path-filtered/scheduled so the fast per-PR ci.yml stays seconds-quick.
on:
  pull_request:
    paths: ['profiles/typescript-node/**', 'scripts/incept.sh', '.github/workflows/golden-path.yml', 'scripts/new-profile.sh', 'scripts/adopter-export.sh', 'scripts/containment-audit.sh', 'profiles/_TEMPLATE.md', 'scripts/otel-trace.sh', 'scripts/orchestrator-run.sh', 'scripts/fixtures/engineer-fixture.sh', 'conformance/orchestrator-loop-wired.sh', 'scripts/otel-to-scorecard.sh', 'scripts/agent-scorecard.sh']
  push:
    paths: ['profiles/typescript-node/**', 'scripts/incept.sh', '.github/workflows/golden-path.yml', 'scripts/new-profile.sh', 'scripts/adopter-export.sh', 'scripts/containment-audit.sh', 'profiles/_TEMPLATE.md', 'scripts/otel-trace.sh', 'scripts/orchestrator-run.sh', 'scripts/fixtures/engineer-fixture.sh', 'conformance/orchestrator-loop-wired.sh', 'scripts/otel-to-scorecard.sh', 'scripts/agent-scorecard.sh']
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  golden-path:
    runs-on: ubuntu-latest
    env:
      GP_DIR: ''  # runtime-set via $GITHUB_ENV; declared so the GitHub Actions linter resolves it
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
      - name: Scaffold a temp adopter project (incept the reference stack)
        run: |
          tmp=$(mktemp -d)
          git archive HEAD | tar -x -C "$tmp"
          ( cd "$tmp" && sh scripts/incept.sh --noninteractive --name GoldenPath \
              --intent-owner "CI" --stack typescript-node --backlog md --ci github --harness claude-code )
          echo "GP_DIR=$tmp" >> "$GITHUB_ENV"
      - name: Run the reference npm pipeline end-to-end
        working-directory: ${{ env.GP_DIR }}
        run: |
          npm ci
          npm run lint
          npm run type-check
          npm test
          npm run build
      - name: Stage the reference Dockerfile (incept leaves it COPY-&-ADAPT; G2 exercises it)
        working-directory: ${{ env.GP_DIR }}
        run: |
          cp profiles/typescript-node/Dockerfile .
          cp profiles/typescript-node/.dockerignore . 2>/dev/null || true
      - name: docker build the reference image
        working-directory: ${{ env.GP_DIR }}
        run: docker build -t golden-path:ci .
      - name: Boot OFF then ON — prove the feature-flag kill-switch end-to-end (via smoke.sh)
        working-directory: ${{ env.GP_DIR }}
        run: |
          wait_live() {  # poll /healthz until the container answers (or fail after 30s)
            ok=0
            for _ in $(seq 1 30); do
              if curl -fsS http://localhost:3000/healthz 2>/dev/null | grep -q '"status":"ok"'; then ok=1; break; fi
              sleep 1
            done
            [ "$ok" = 1 ] || { echo "golden-path: container never became live on /healthz"; docker logs gp || true; docker rm -f gp >/dev/null 2>&1 || true; exit 1; }
          }

          # Boot 1 — flag OFF (default). smoke (also OFF) expects the kill-switch greeting.
          docker run -d --name gp -p 3000:3000 golden-path:ci
          wait_live
          # E4c — runtime-security: the booted app must return the security headers (proven, non-vacuous).
          rs_hdrs=$(curl -sS -D - -o /dev/null http://localhost:3000/healthz)
          for h in 'x-content-type-options: nosniff' 'x-frame-options: DENY' "content-security-policy: default-src 'none'" 'referrer-policy: no-referrer'; do
            printf '%s\n' "$rs_hdrs" | grep -iqF -- "$h" || { echo "runtime-security: MISSING header: $h"; docker logs gp || true; docker rm -f gp >/dev/null 2>&1 || true; exit 1; }
          done
          echo "runtime-security: OK — all security headers present on the booted app"
          # E5-log — structured request logging: the booted app emits a structured JSON line per
          # request (DEVELOPMENT-STANDARDS §3). Non-vacuous: the pre-logging app emitted no such line.
          sl_line=$(docker logs gp 2>&1 | grep -F '"requestId"' | tail -1)
          [ -n "$sl_line" ] || { echo "structured-logging: no structured request log line on the booted app"; docker logs gp || true; docker rm -f gp >/dev/null 2>&1 || true; exit 1; }
          printf '%s' "$sl_line" | jq -e '.requestId and .method and .path and (.status|type=="number") and (.latencyMs|type=="number") and .level and .service and .ts' >/dev/null \
            || { echo "structured-logging: log line missing required fields: $sl_line"; docker rm -f gp >/dev/null 2>&1 || true; exit 1; }
          echo "structured-logging: OK — booted app emits structured request logs"
          # E5-trace — app-level request tracing: the booted app emits an OTel-semantic span per
          # request that converts through the existing OTLP seam (scripts/otlp-export.sh). Non-vacuous:
          # the pre-trace app emitted no span line.
          docker logs gp 2>&1 | grep -F '"trace_id"' > gp_spans.ndjson || true
          [ -s gp_spans.ndjson ] || { echo "app-tracing: no OTel span line on the booted app"; docker logs gp || true; docker rm -f gp >/dev/null 2>&1 || true; exit 1; }
          tail -1 gp_spans.ndjson | jq -e '(.trace_id|test("^[0-9a-f]{32}$")) and (.span_id|test("^[0-9a-f]{16}$")) and ((.end_unix_nano|tonumber) > (.start_unix_nano|tonumber)) and .attributes["http.request.method"] and .attributes.request_id and .status.code' >/dev/null \
            || { echo "app-tracing: span line invalid: $(tail -1 gp_spans.ndjson)"; docker rm -f gp >/dev/null 2>&1 || true; exit 1; }
          sh scripts/otlp-export.sh gp_spans.ndjson --dry-run 2>/dev/null | jq -e '.resourceSpans[0].scopeSpans[0].spans[0] | .traceId and .spanId and .name' >/dev/null \
            || { echo "app-tracing: spans did not convert through the otlp-export.sh OTLP seam"; docker rm -f gp >/dev/null 2>&1 || true; exit 1; }
          echo "app-tracing: OK — booted app emits OTel request spans that convert through the OTLP seam"
          # E5-metrics — Prometheus /metrics: the booted app exposes a scrapeable metrics endpoint
          # (DEVELOPMENT-STANDARDS Factor 14). Non-vacuous: the pre-metrics app 404s /metrics.
          metrics=$(curl -fsS http://localhost:3000/metrics)
          printf '%s\n' "$metrics" | grep -qF '# TYPE http_requests_total counter' || { echo "metrics-endpoint: /metrics not in Prometheus exposition format"; docker logs gp || true; docker rm -f gp >/dev/null 2>&1 || true; exit 1; }
          printf '%s\n' "$metrics" | grep -F 'http_requests_total{method="GET"' | grep -qE '} [1-9]' || { echo "metrics-endpoint: GET counter not incremented"; printf '%s\n' "$metrics"; docker rm -f gp >/dev/null 2>&1 || true; exit 1; }
          echo "metrics-endpoint: OK — booted app exposes a Prometheus /metrics endpoint with live counters"
          if ! sh scripts/smoke.sh; then echo "golden-path: OFF smoke failed (kill-switch path)"; docker logs gp || true; docker rm -f gp >/dev/null 2>&1 || true; exit 1; fi
          docker rm -f gp >/dev/null 2>&1 || true

          # Boot 2 — flag ON. smoke (also ON) expects the new greeting. Proves the flag flips behaviour.
          docker run -d --name gp -p 3000:3000 -e FEATURE_NEW_GREETING=true golden-path:ci
          wait_live
          if ! FEATURE_NEW_GREETING=true sh scripts/smoke.sh; then echo "golden-path: ON smoke failed (feature path)"; docker logs gp || true; docker rm -f gp >/dev/null 2>&1 || true; exit 1; fi
          docker rm -f gp >/dev/null 2>&1 || true

          echo "golden-path: pipeline + image + flag-flip (OFF kill-switch / ON feature) all green"

  generator-golden-path:
    # R1 — execute scripts/new-profile.sh against a REAL pruned export (the condition that hid B1:
    # profiles/python/ is absent there) and assert the generated stub is conformant. Proves the
    # generator RUNS + emits a conformant stub; does NOT prove a FILLED profile is correct.
    runs-on: ubuntu-latest
    env:
      EXPORT: ''  # runtime-set via $GITHUB_ENV; declared so the GitHub Actions linter resolves it
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Export the kit (pruned --profile typescript-node; python/ absent)
        run: |
          tmp=$(mktemp -d)
          sh scripts/adopter-export.sh "$tmp/export" --profile typescript-node
          echo "EXPORT=$tmp/export" >> "$GITHUB_ENV"
      - name: Generate a profile INSIDE the export (RED on the pre-fix generator)
        working-directory: ${{ env.EXPORT }}
        run: sh scripts/new-profile.sh teststack
      - name: Assert the generated stub is conformant
        working-directory: ${{ env.EXPORT }}
        run: |
          sh conformance/actionlint-valid.sh
          PROV_ROOT=. sh conformance/provenance-precondition.sh
          sh conformance/ci-gates.sh profiles/teststack/ci.yml
          # B2 pin check on the GENERATED file directly. action-pinning.sh scopes to the canonical
          # reference (profiles/typescript-node/ci.yml) + kit workflows, NOT generated profiles, so
          # it would pass VACUOUSLY here — assert the generated stub's pins ourselves, mirroring
          # action-pinning's extraction (strip trailing # comments, take the ref, require @<40-hex>).
          bad=$(grep -E '^[[:space:]]*-?[[:space:]]*uses:' profiles/teststack/ci.yml | sed 's/#.*//' | awk '{print $NF}' | grep -Ev '^[^@]*@[0-9a-f]{40}$' || true)
          [ -z "$bad" ] || { echo "FAIL: unpinned uses: in generated stub: $bad"; exit 1; }
          echo "OK: every uses: in the generated stub is SHA-pinned"

  containment-audit:
    # E4a — boot the reference `agent` sandbox and PROVE it contains (FS-scope/egress/caps),
    # each negative probe paired with a positive control. The behavioural backing for the
    # attestation in conformance/containment-ready.sh.
    runs-on: ubuntu-latest
    env:
      CA_DIR: ''  # runtime-set via $GITHUB_ENV; declared so the GitHub Actions linter resolves it
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Scaffold a temp adopter project (incept the reference stack)
        run: |
          tmp=$(mktemp -d)
          git archive HEAD | tar -x -C "$tmp"
          ( cd "$tmp" && sh scripts/incept.sh --noninteractive --name Containment \
              --intent-owner "CI" --stack typescript-node --backlog md --ci github --harness claude-code )
          echo "CA_DIR=$tmp" >> "$GITHUB_ENV"
      - name: Stage the reference compose + Dockerfile (incept leaves them COPY-&-ADAPT)
        working-directory: ${{ env.CA_DIR }}
        run: |
          cp profiles/typescript-node/compose.yaml .
          cp profiles/typescript-node/Dockerfile .
          cp profiles/typescript-node/.dockerignore . 2>/dev/null || true
      - name: Boot the agent sandbox and probe containment (FS/egress/caps PROVEN)
        working-directory: ${{ env.CA_DIR }}
        run: CI=1 sh scripts/containment-audit.sh .
  agentops-sensor:
    # E5-thin — PROVE the operate-loop sensor runs on REAL emitted data (not a fixture):
    # emit an OTel trace from the orchestrator stand-in, adapt it, score it, and assert
    # the scorecard's denial_rate reflects the emitted DENIED span (a dead emitter can't).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: emit -> adapt -> score, assert non-vacuous denial_rate
        run: |
          t=$(sh scripts/orchestrator-run.sh)
          d=$(mktemp -d)
          i=0; sh scripts/otel-to-scorecard.sh "$t" | jq -c '.[]' | while read -r r; do echo "$r" > "$d/$i.json"; i=$((i+1)); done
          sh scripts/agent-scorecard.sh --traces "$d" --min-runs 1 --stdout > sc.json
          jq -e '[.[]|select(.metrics.denial_rate>0)]|length>=1' sc.json >/dev/null \
            || { echo "agentops-sensor: scorecard did not reflect the emitted denied span (vacuous)"; cat sc.json; exit 1; }
          echo "agentops-sensor: OK — real emit->adapt->score loop, denial_rate derived from emitted span"

  orchestrator-loop:
    # E3a — PROVE the thin 4-seat loop runs end-to-end: fan-out (isolated worktrees) -> contain
    # (runaway-guard halts on breach) -> integrate -> emit the trace the scorecard reads. The
    # fixture engineer is the deterministic null-LLM actor; an LLM engineer rides the same rails live.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: the orchestration loop runs (fan-out + guard-halt + integrate + trace)
        run: |
          sh scripts/orchestrator-run.sh --selftest
          sh conformance/orchestrator-loop-wired.sh --selftest
          sh scripts/escalate.sh --selftest
          sh conformance/escalation-wired.sh --selftest
          echo "orchestrator-loop: OK — loop selftest (incl. escalation pause+resume) + wiring locks green"

  image-vuln:
    # E4b — PROVE the image-vuln gate runs + discriminates. Scan the reference image (must PASS
    # clean) and a pinned KNOWN-VULNERABLE fixture (must FAIL) under the identical policy, so the
    # gate can't vacuously pass. Single mechanism (the SHA-pinned trivy-action); the RED uses the
    # GHA continue-on-error + outcome-assert idiom (the action fails the step on findings).
    runs-on: ubuntu-latest
    env:
      IV_DIR: ''  # runtime-set via $GITHUB_ENV; declared so the GitHub Actions linter resolves it
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
      - name: Scaffold a temp adopter project (incept the reference stack)
        run: |
          tmp=$(mktemp -d)
          git archive HEAD | tar -x -C "$tmp"
          ( cd "$tmp" && sh scripts/incept.sh --noninteractive --name ImageVuln \
              --intent-owner "CI" --stack typescript-node --backlog md --ci github --harness claude-code )
          echo "IV_DIR=$tmp" >> "$GITHUB_ENV"
      - name: Stage the reference Dockerfile + build the reference image
        working-directory: ${{ env.IV_DIR }}
        run: |
          cp profiles/typescript-node/Dockerfile .
          cp profiles/typescript-node/.dockerignore . 2>/dev/null || true
          docker build -t ts-node-app:ci .
      - name: PASS — the reference image is clean under the gate policy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ts-node-app:ci
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'
          exit-code: '1'
      - name: RED — scan a pinned KNOWN-VULNERABLE fixture (must be blocked)
        id: red_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: python@sha256:2d97f6910b16bd338d3060f261f53f144965f755599aab1acda1e13cf1731b1b  # ~2yr-old python:3.9-slim; swap per design §3 if it ever scans clean
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'
          exit-code: '1'
          format: 'json'
          output: 'trivy-red.json'
      - name: Assert the gate BLOCKED the vulnerable fixture (non-vacuous RED)
        run: |
          if [ "${{ steps.red_scan.outcome }}" = "failure" ] && [ "$(jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0' trivy-red.json 2>/dev/null)" -gt 0 ]; then
            echo "RED OK: gate blocked the vulnerable fixture"
          else
            echo "RED FAIL: fixture produced no CRITICAL/HIGH findings (clean, stale, or unpullable) — gate not proven non-vacuous"; exit 1
          fi

  otlp-backend:
    # E5-backend — PROVE the app’s telemetry REACHES a real OTLP backend (not just emitted/convertible).
    # Boot the reference app, capture its emitted spans, POST them via the EXISTING otlp-export.sh real
    # path (NO --dry-run) to a real OpenTelemetry Collector, and assert the exact emitted trace_id was
    # received+decoded. Non-vacuous: a dead/empty collector cannot print the app’s random 32-hex id.
    runs-on: ubuntu-latest
    env:
      OB_DIR: ''  # runtime-set via $GITHUB_ENV; declared so the GitHub Actions linter resolves it
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
      - name: Scaffold a temp adopter project (incept the reference stack)
        run: |
          tmp=$(mktemp -d)
          git archive HEAD | tar -x -C "$tmp"
          ( cd "$tmp" && sh scripts/incept.sh --noninteractive --name OtlpBackend \
              --intent-owner "CI" --stack typescript-node --backlog md --ci github --harness claude-code )
          echo "OB_DIR=$tmp" >> "$GITHUB_ENV"
      - name: Stage the reference Dockerfile + build the reference image
        working-directory: ${{ env.OB_DIR }}
        run: |
          cp profiles/typescript-node/Dockerfile .
          cp profiles/typescript-node/.dockerignore . 2>/dev/null || true
          docker build -t otlp-backend:ci .
      - name: Boot app, capture spans, round-trip through a real OTLP collector
        working-directory: ${{ env.OB_DIR }}
        run: |
          cleanup() { docker rm -f gp otelcol >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          # 1) Boot the reference app; wait for liveness; it emits an OTel span per served request.
          docker run -d --name gp -p 3000:3000 otlp-backend:ci
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:3000/healthz 2>/dev/null | grep -q '"status":"ok"'; then ok=1; break; fi
            sleep 1
          done
          [ "$ok" = 1 ] || { echo "otlp-backend: app never became live"; docker logs gp || true; exit 1; }
          # 2) Capture emitted spans + record the exact emitted trace_id (the non-vacuity key).
          docker logs gp 2>&1 | grep -F '"trace_id"' > gp_spans.ndjson || true
          [ -s gp_spans.ndjson ] || { echo "otlp-backend: app emitted no span line"; docker logs gp || true; exit 1; }
          EMITTED=$(tail -1 gp_spans.ndjson | jq -r .trace_id)
          printf '%s\n' "$EMITTED" | grep -qE '^[0-9a-f]{32}$' || { echo "otlp-backend: bad emitted trace_id: $EMITTED"; exit 1; }
          # 3) Boot a REAL OpenTelemetry Collector (OTLP/HTTP :4318 -> debug exporter -> stdout).
          docker run -d --name otelcol -p 4318:4318 \
            -v "$PWD/profiles/typescript-node/scaffold/observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro" \
            otel/opentelemetry-collector@sha256:da954d90ea3095c1e816da0878b9723ac0d18d6bd8857db4fec3c39d2937d595 \
            --config /etc/otelcol/config.yaml  # v0.116.1 linux/amd64
          cok=0
          for _ in $(seq 1 30); do
            if curl -sS -o /dev/null http://localhost:4318/ 2>/dev/null; then cok=1; break; fi
            sleep 1
          done
          [ "$cok" = 1 ] || { echo "otlp-backend: collector never opened :4318"; docker logs otelcol || true; exit 1; }
          # 4) REAL POST via the existing seam (NOT --dry-run) — the path under test.
          OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 sh scripts/otlp-export.sh gp_spans.ndjson
          # 5) Assert RECEIPT: the collector logged our exact trace_id AND a decoded span (non-vacuous).
          rok=0
          for _ in $(seq 1 15); do
            logs=$(docker logs otelcol 2>&1)
            if printf '%s' "$logs" | grep -qiF "$EMITTED" && printf '%s' "$logs" | grep -qE 'ResourceSpans|Span #|Trace ID'; then rok=1; break; fi
            sleep 1
          done
          [ "$rok" = 1 ] || { echo "otlp-backend: collector did not receive+decode trace_id ($EMITTED)"; echo "--- collector ---"; docker logs otelcol || true; echo "--- app ---"; docker logs gp || true; exit 1; }
          echo "otlp-backend: OK — app spans POSTed via otlp-export.sh and received+decoded by a real OTLP collector"

  trace-query:
    # E5-ops-query -- PROVE the operator can FIND the trace: app spans POSTed via the existing
    # otlp-export.sh real path to a real Jaeger backend are STORED and RETRIEVABLE by trace_id via
    # Jaeger's query API (GET /api/traces/{id}). One gradient past otlp-backend (receipt -> queryable
    # storage). Non-vacuous: an empty store returns .data == [] and cannot fabricate the app's random id.
    runs-on: ubuntu-latest
    env:
      TQ_DIR: ''  # runtime-set via $GITHUB_ENV; declared so the GitHub Actions linter resolves it
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
      - name: Scaffold a temp adopter project (incept the reference stack)
        run: |
          tmp=$(mktemp -d)
          git archive HEAD | tar -x -C "$tmp"
          ( cd "$tmp" && sh scripts/incept.sh --noninteractive --name TraceQuery \
              --intent-owner "CI" --stack typescript-node --backlog md --ci github --harness claude-code )
          echo "TQ_DIR=$tmp" >> "$GITHUB_ENV"
      - name: Stage the reference Dockerfile + build the reference image
        working-directory: ${{ env.TQ_DIR }}
        run: |
          cp profiles/typescript-node/Dockerfile .
          cp profiles/typescript-node/.dockerignore . 2>/dev/null || true
          docker build -t trace-query:ci .
      - name: Boot app + Jaeger, POST spans, RETRIEVE by trace_id via the query API
        working-directory: ${{ env.TQ_DIR }}
        run: |
          cleanup() { docker rm -f gp jaeger >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          # 1) Boot the reference app; wait for liveness; it emits an OTel span per served request.
          docker run -d --name gp -p 3000:3000 trace-query:ci
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:3000/healthz 2>/dev/null | grep -q '"status":"ok"'; then ok=1; break; fi
            sleep 1
          done
          [ "$ok" = 1 ] || { echo "trace-query: app never became live"; docker logs gp || true; exit 1; }
          # 2) Capture emitted spans + the exact emitted trace_id (the non-vacuity key).
          docker logs gp 2>&1 | grep -F '"trace_id"' > gp_spans.ndjson || true
          [ -s gp_spans.ndjson ] || { echo "trace-query: app emitted no span line"; docker logs gp || true; exit 1; }
          EMITTED=$(tail -1 gp_spans.ndjson | jq -r .trace_id)
          printf '%s\n' "$EMITTED" | grep -qE '^[0-9a-f]{32}$' || { echo "trace-query: bad emitted trace_id: $EMITTED"; exit 1; }
          # 3) Boot a REAL Jaeger backend (OTLP/HTTP ingest :4318 + query API :16686).
          docker run -d --name jaeger -e COLLECTOR_OTLP_ENABLED=true -p 4318:4318 -p 16686:16686 \
            jaegertracing/all-in-one@sha256:836e9b69c88afbedf7683ea7162e179de63b1f981662e83f5ebb68badadc710f  # v1.62.0
          iok=0
          for _ in $(seq 1 30); do
            if curl -sS -o /dev/null http://localhost:4318/ 2>/dev/null && curl -sS -o /dev/null http://localhost:16686/ 2>/dev/null; then iok=1; break; fi
            sleep 1
          done
          [ "$iok" = 1 ] || { echo "trace-query: jaeger never opened :4318/:16686"; docker logs jaeger || true; exit 1; }
          # 4) REAL POST via the existing seam (NOT --dry-run) -- the path under test.
          OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 sh scripts/otlp-export.sh gp_spans.ndjson
          # 5) QUERY round-trip: retrieve the trace by id from Jaeger's query API; poll for ingest consistency.
          #    Non-vacuous: we query the SPECIFIC random id -> non-empty .data means Jaeger stored+matched it.
          qok=0
          for _ in $(seq 1 15); do
            resp=$(curl -sS "http://localhost:16686/api/traces/$EMITTED" 2>/dev/null || true)
            if printf '%s' "$resp" | jq -e --arg t "$EMITTED" '(.data | length > 0) and ((.data[0].traceID | ascii_downcase) == ($t | ascii_downcase)) and ([.data[0].spans[]] | length > 0)' >/dev/null 2>&1; then qok=1; break; fi
            sleep 1
          done
          [ "$qok" = 1 ] || { echo "trace-query: Jaeger did not return the emitted trace_id ($EMITTED) via the query API"; echo "--- last query resp ---"; printf '%s\n' "$resp"; echo "--- jaeger logs ---"; docker logs jaeger || true; exit 1; }
          echo "trace-query: OK -- app spans POSTed via otlp-export.sh and RETRIEVED by trace_id from a real Jaeger query API"
