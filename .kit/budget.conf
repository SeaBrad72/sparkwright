# .kit/budget.conf — E4d runaway ceilings (CONTROL-PLANE: raising a ceiling is a ratified act).
# A dimension is DISABLED when its value is 0. Tune to your run profile; see docs/operations/runaway-killswitch.md.
MAX_TOKENS=2000000
MAX_STEPS=200
MAX_AGENTS=50
WARN_PCT=80
COST_PER_1K_USD=0.003
# Relative tier-weights for the value analysis model (deep-equivalent units; NOT dollars).
# Static; edited rarely. Absent/all-equal => cost axis = raw tokens, savings 0 (advisory). Graceful-degrade to 1.0.
# WEIGHT_APEX (Fable) > 1.0: apex is the most capable + most expensive tier. Placeholder until MODEL-TIER-WEIGHTS
# sets real opus:fable output-price ratios; graceful-degrade to 1.0 if absent (apex would read as deep-equiv).
WEIGHT_APEX=4.0
WEIGHT_DEEP=1.0
WEIGHT_FAST=0.3
WEIGHT_LIGHT=0.1
