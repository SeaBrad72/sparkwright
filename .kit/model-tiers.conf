# .kit/model-tiers.conf — model-tiering policy (CONTROL-PLANE: pins/floors are a ratified posture).
# "tier" = MODEL tier (apex>deep>fast>light), NOT the autonomy/promotion tier (scripts/tier-advice.sh, DEV-PROCESS §13).
# Values are comma-separated, NO spaces (the cfg() parser stops at the first whitespace).
TIERS=apex,deep,fast,light
# Pinned seats — resolve `deep` and IGNORE any DOWNGRADE request. (FABLE-TIER 2026-07-23: architect/plan
# stay pinned — never cheapened — but may be RAISED to `apex` via APEX_ELIGIBLE below; that is an upgrade,
# not a downgrade, so the pin governance holds.)
PIN=orchestrator,reviewer,security,architect,plan,verification
# APEX-eligible seats — the ONLY seats that may be RAISED to `apex` (Fable), and only on a NON-floored
# (ordinary-class) task. reviewer/security/orchestrator/verification are absent by design → they stay `deep`
# (Opus). apex is opt-in per plan (owner-ratified 2026-07-23), never an auto-escalation.
APEX_ELIGIBLE=engineer,architect,plan
# Variable seats — may run a requested tier within ALLOWED_<role>, subject to floors.
VARIABLE=engineer,explorer
ALLOWED_engineer=deep,fast
ALLOWED_explorer=deep,fast,light
DEFAULT_engineer=deep
DEFAULT_explorer=fast
# The full set of VALID change-classes (promotion-contract: ordinary/sensitive/control-plane).
# The resolver normalizes --change-class (trim+lowercase); a NON-EMPTY value that is not one of these
# is treated as top-tier (fail-safe) — a malformed/miscased class can never DOWNGRADE a floored task.
CHANGE_CLASSES=ordinary,sensitive,control-plane
# Hard floors — a task carrying any of these change-classes (or --critical-path) forces `deep`.
# Only classes listed here floor; everything else that is a KNOWN class (ordinary) allows the requested tier.
FLOOR_CHANGE_CLASS=control-plane,sensitive
