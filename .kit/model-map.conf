# .kit/model-map.conf — adopter-owned abstract-tier → concrete-model map (CONTROL-PLANE).
# What it changes: binds the resolver's abstract tier (deep/fast/light) to a real model id
#   for THIS harness. Opaque to the neutral core; edited only by the adopter/human.
# Guardrails: control-plane (guard-locked in all 3 matchers) — an agent remapping deep→cheap
#   would defeat the pins as surely as editing .kit/model-tiers.conf.
# Honest ceiling: DECLARED, not OBEYED. This file states the intended model per tier; whether the
#   harness actually ran a subagent on it is NATIVE / un-gateable. Absent or single-value ⇒
#   graceful degradation (all tiers collapse to one model; tiering advisory), never a crash.
apex=fable
deep=opus
fast=sonnet
light=haiku
