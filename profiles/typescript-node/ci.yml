# Reference CI pipeline for the TypeScript/Node profile.
# COPY & ADAPT: copy this file to your project's .github/workflows/ci.yml.
# It is INERT here in the kit repo (GitHub only runs workflows under .github/workflows/).
# Each quality gate carries a standardized `id: gate-*` that conformance/ci-gates.sh asserts.
# Satisfies DEVELOPMENT-STANDARDS.md §14 (CI/CD Pipeline) incl. the conditional
# container image supply-chain (gate-image-sbom + gate-image-provenance).
#
# HARDENING (do before production):
#  - Pin every `uses:` to a full 40-char commit SHA (e.g. actions/checkout@<sha>  # v6.x).
#    Note `anchore/sbom-action@v0` is a MAJOR-version float (highest-risk) — pin it first.
#  - Pin tool installs to exact versions.
#  - OIDC is least-privilege here: id-token:write / packages:write live only on the
#    push-only provenance jobs, so PR-triggered steps cannot mint a token or push an
#    image. Your cloud trust policy MUST restrict `sub` to
#    `repo:<org>/<repo>:ref:refs/heads/main` (never `pull_request`).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    outputs:
      has_dockerfile: ${{ steps.detect-dockerfile.outputs.has_dockerfile }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # >>> kit:db-backed (incept removes for non-DB archetypes)
    # The ts-node default archetype IS a DB-backed service (authed CRUD + a relational store), so
    # Postgres ships ACTIVE: integration tests get a real database in CI (the profile's §6 testing
    # guidance asserts DB state). NOTE: `npx prisma generate` MUST run before type-check/build (tsc
    # needs the client) and `prisma migrate deploy` before tests — add those steps when you wire an
    # ORM/schema (the minimal /healthz starter does not connect, so the idle service stays green).
    # `sh scripts/incept.sh --no-db …` strips this whole delimited region AND deletes the
    # scaffold/.db-backed marker, so a NON-DB archetype ships no idle database service.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: 'postgres://postgres:postgres@localhost:5432/app'
    # <<< kit:db-backed
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0   # full history so the secret scan sees all commits

      - name: Conformance aggregate (required — DEVELOPMENT-STANDARDS.md §14)
        # No `gate-*` id: this is the aggregate, not one of the eight §14 gate ids
        # that conformance/ci-gates.sh REQUIREs. Blocks on the CONTROL battery — `[doc]` failures
        # exit 0 by design (verify.sh's RESULT lines), so a day-one adopter is not blocked by an
        # unwritten RPO/RTO. Placed before toolchain setup because the aggregate is POSIX sh with
        # no toolchain dependency; identical placement across every emitted pipeline is what makes
        # `conformance/verify-enforced-wired.sh --fleet` cheap to lock.
        run: sh conformance/verify.sh --require

      - name: Detect Dockerfile (drives the push-only image-provenance gate; G1)
        id: detect-dockerfile
        run: |
          if [ -f Dockerfile ]; then echo "has_dockerfile=true"; else echo "has_dockerfile=false"; fi >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        id: gate-install
        run: npm ci

      - name: Lint
        id: gate-lint
        run: npm run lint

      - name: Type-check
        id: gate-type-check
        run: npm run type-check

      - name: Test + coverage (>=80%)
        id: gate-test
        run: npm run test:coverage   # vitest --coverage; thresholds enforced in vitest.config.ts

      - name: AI eval gate (conditional — runs only if an evals/ dir is present)
        id: gate-eval
        run: |
          if [ -d evals ]; then
            npm run eval   # define an "eval" script that scores against a rubric and exits non-zero below threshold
          else
            echo "no evals/ dir — skipping the eval gate (add one when your feature uses a model; see profiles/ml/evals for a reference)"
          fi

      - name: Build
        id: gate-build
        run: npm run build

      - name: Secret scan
        id: gate-secret-scan
        # Range-independent full-tree scan via the pinned gitleaks binary (checksum-verified; H4b
        # supply-chain pattern). Replaces gitleaks-action's commit-range mode, which failed on PR
        # merge-refs ("Invalid revision range") and needed pull-requests:read; `gitleaks dir` makes
        # no API call (least-privilege: contents:read suffices) and scans the full committed tree,
        # respecting .gitignore. Pinned v8.24.3 + sha256 (gitleaks_8.24.3_checksums.txt).
        # SECRET-GATE SCOPE: this is a FULL-history, full-tree scan (fetch-depth: 0 above). The only
        # thing out of scope is generated build output (dist/, coverage/) — and it is out of scope
        # because it is `.gitignore`d (see scaffold/.gitignore), which `gitleaks dir` respects. No
        # allowlist file is used or needed: gitleaks' `.gitleaksignore` holds finding FINGERPRINTS
        # (commit:file:rule:line), NOT path globs, so a path-glob allowlist would be inert (rejected
        # with a warning). Source, env files, and configs are never excluded — they stay fully in scope.
        run: |
          GL_VER=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          echo "9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c  /tmp/gitleaks.tgz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          /tmp/gitleaks dir . --no-banner --redact

      - name: Dependency vulnerability scan
        id: gate-dep-scan
        run: npm audit --omit=dev --audit-level=high   # prod-dep posture; triage dev-tool advisories separately (they don't ship)

      - name: Dependency advisories — full tree (report-only, non-enforcing)
        # Visibility, NOT a gate: surfaces dev/build-time advisories that gate-dep-scan
        # (--omit=dev) excludes. Never promote to a required gate — see CP7R5-K4.
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Generate SBOM (CycloneDX)
        id: gate-sbom
        # Version-pinned like every action SHA in this file: an unpinned `npx` fetches and EXECUTES
        # whatever the registry serves at run time, which is a supply-chain surface the rest of this
        # workflow deliberately closes.
        run: npx --yes @cyclonedx/cyclonedx-npm@6.0.0 --output-format JSON --output-file sbom.json

      - name: SAST (Semgrep)
        id: gate-sast
        # `run:` (not a marketplace action) — nothing to SHA-pin, satisfies action-pinning.sh.
        # `--error` makes findings fail the gate; tune `--config` to a pinned ruleset for prod.
        # SAST SCOPE — EXCLUSION-scoping (deliberate, security reason): scan the WHOLE app by default
        # (`--error .`) and opt OUT of only genuinely-noisy generated/vendored paths via the committed
        # `.semgrepignore` (dist/, coverage/, node_modules/ — see scaffold/.semgrepignore). This is the
        # secure default: a new code root you add later (app/, server/, lib/, pages/) stays covered
        # automatically — the previous src/-only INCLUSION scope would have SILENTLY dropped SAST on any
        # code outside src/. Never trade whole-app coverage for a single-dir scope. Keep `--config
        # p/default` (a pinned ruleset); never `--config auto` (auto resolves a different registry
        # ruleset per environment = a flaky required gate).
        run: pipx run semgrep --config p/default --error .

      - name: License policy (over the SBOM)
        id: gate-license
        run: sh scripts/license-check.sh --sbom sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom
          path: sbom.json

      - name: Emit agent-ops trace (agentops sensor)
        id: gate-agent-trace
        # Emits one OTel-shaped agent-ops span for this CI run (the agentops-sensor path): runs the
        # shipped scripts/otel-trace.sh sensor when present, else a minimal inline NDJSON span — so an
        # adopter that has not wired the sensor still passes (no missing-script RED). This step
        # OBSERVES; it never narrows any gate.
        #
        # CP-7 K9: this step used to call `otel-trace.sh --emit`, which the sensor's dispatch does not
        # provide (it offers new-trace | span | --selftest), so it exited 2 on EVERY adopter's first CI
        # run — while carrying a comment claiming it was green by construction. Only the `else` branch
        # had ever been reasoned about; the `if` branch is the one that always runs in production.
        # conformance/ci-gates.sh now resolves this invocation statically, and the golden-path job
        # EXECUTES this chain against a real incepted vehicle. Do not reintroduce an unsupported verb.
        run: |
          if [ -f scripts/otel-trace.sh ]; then
            tid=$(sh scripts/otel-trace.sh new-trace)
            sh scripts/otel-trace.sh span --trace "$tid" --name agentops.ci --status OK \
              --attr "ci.run_id=${GITHUB_RUN_ID:-local}"
          else
            printf '{"name":"agentops.ci","status":{"code":"OK"}}\n'
          fi

      # --- conditional container image supply-chain (service profile) ---
      # Builds the image and scans it on EVERY PR (real scan-before-merge); no push here.
      # NOTE: this PR-time build and the push-only `image-provenance` build are independent,
      # so the scanned digest is not guaranteed identical to the attested digest. Least-
      # privilege forbids the PR job from pushing, so a single shared build can't span both.
      # For production, make SBOM and provenance cover identical bits: e.g. in image-provenance,
      # also generate an SBOM of the pushed digest (Syft against ghcr.io/...@<digest>) and
      # attest it alongside provenance — so the release SBOM matches the attested image.
      - name: Build container image (local, for SBOM scan)
        if: ${{ hashFiles('Dockerfile') != '' }}   # skips until you adapt the profile's COPY-&-ADAPT Dockerfile into the repo
        run: docker build -t ts-node-app:ci .

      - name: Generate image SBOM (Syft, CycloneDX)
        if: ${{ hashFiles('Dockerfile') != '' }}   # skips until you adapt the profile's COPY-&-ADAPT Dockerfile into the repo
        id: gate-image-sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ts-node-app:ci
          format: cyclonedx-json
          output-file: image-sbom.json

      - name: Image vulnerability scan (fixable CRITICAL/HIGH)
        if: ${{ hashFiles('Dockerfile') != '' }}   # skips until you adapt the profile's COPY-&-ADAPT Dockerfile into the repo
        id: gate-image-vuln
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ts-node-app:ci
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'
          exit-code: '1'

      - name: Upload image SBOM
        if: ${{ hashFiles('Dockerfile') != '' }}   # skips until you adapt the profile's COPY-&-ADAPT Dockerfile into the repo
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: image-sbom
          path: image-sbom.json

      - name: Upload build artifact (for provenance)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: build-artifact
          path: dist/**           # the real build output (npm run build)
          if-no-files-found: error

  # NOTE (provenance precondition): the SLSA attestations API is unavailable on user-owned PRIVATE repos,
  # so these jobs are gated to run only on public or org-owned repos — otherwise `main` would go red on
  # first merge with no in-repo explanation. Make the repo public or move it to a GitHub org to enable.
  # This is a SKIP-WITH-REASON, not a silent disable: the job still runs (and attests) wherever the
  # precondition holds; it is legibly skipped only where the attestations API genuinely cannot mint one.
  provenance:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (github.event.repository.private == false || github.event.repository.owner.type == 'Organization')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # scoped to this push-only job (build-provenance attestation)
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: build-artifact
          path: build-artifact
      - name: Attest build provenance
        id: gate-provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018  # v1
        with:
          subject-path: build-artifact/**

  image-provenance:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci.outputs.has_dockerfile == 'true' && (github.event.repository.private == false || github.event.repository.owner.type == 'Organization')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # push image to GHCR (scoped to this push-only job)
      id-token: write       # OIDC for digest-bound attestation
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute lowercase image name
        id: image
        # GHCR stores image paths lowercase; github.repository may be mixed-case
        # (e.g. SeaBrad72/App). A mixed-case subject-name breaks attestation verification.
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.sha }}
      - name: Attest image provenance (digest-bound)
        id: gate-image-provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018  # v1
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true
