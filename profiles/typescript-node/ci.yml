# Reference CI pipeline for the TypeScript/Node profile.
# COPY & ADAPT: copy this file to your project's .github/workflows/ci.yml.
# It is INERT here in the kit repo (GitHub only runs workflows under .github/workflows/).
# Each quality gate carries a standardized `id: gate-*` that conformance/ci-gates.sh asserts.
# Satisfies DEVELOPMENT-STANDARDS.md §14 (CI/CD Pipeline).
#
# HARDENING (do before production):
#  - Pin every `uses:` to a full 40-char commit SHA (e.g. actions/checkout@<sha>  # v4.x).
#  - Pin tool installs to exact versions.
#  - OIDC is least-privilege here: id-token:write lives only on the push-only `provenance`
#    job, so PR-triggered steps cannot mint a token. Your cloud trust policy MUST restrict
#    `sub` to `repo:<org>/<repo>:ref:refs/heads/main` (never `pull_request`).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the secret scan sees all commits

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        id: gate-install
        run: npm ci

      - name: Lint
        id: gate-lint
        run: npm run lint

      - name: Type-check
        id: gate-type-check
        run: npm run type-check

      - name: Test + coverage (>=80%)
        id: gate-test
        run: npm run test:coverage   # vitest --coverage; thresholds enforced in vitest.config.ts

      - name: Build
        id: gate-build
        run: npm run build

      - name: Secret scan
        id: gate-secret-scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Organization-owned repos additionally require a gitleaks license:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Dependency vulnerability scan
        id: gate-dep-scan
        run: npm audit --audit-level=high

      - name: Generate SBOM (CycloneDX)
        id: gate-sbom
        run: npx --yes @cyclonedx/cyclonedx-npm --output-format JSON --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Upload build artifact (for provenance)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: sbom.json          # placeholder — set to your real artifact (e.g. dist/** or the published package/image)
          if-no-files-found: error

  provenance:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # scoped to this push-only job (build-provenance attestation)
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: build-artifact
      - name: Attest build provenance
        id: gate-provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: build-artifact/**
