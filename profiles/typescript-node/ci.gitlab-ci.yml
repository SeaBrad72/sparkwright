# GitLab CI reference — TypeScript/Node profile.
# Expresses the SAME contract as profiles/typescript-node/ci.yml (GitHub Actions): the 8
# standardized gate-ids of DEVELOPMENT-STANDARDS.md §14, here as GitLab CI JOB KEYS named
# `gate-<x>`. `conformance/ci-gates.sh` recognizes these job keys; the contract is the
# gate-ids, the platform is open. See docs/operations/ci-platforms.md.
#
# Drop in as `.gitlab-ci.yml` at your repo root (incept.sh --ci gitlab does this).
# Tool choices mirror the GitHub profile (pnpm + eslint + tsc + vitest + gitleaks + syft).
# Where GitLab ships a native control, the comment names it — prefer it at scale.
#
# NOTE (H1): this GitLab reference does NOT yet carry the `gate-agent-boundary` §13 control-plane
# ratification gate that profiles/typescript-node/ci.yml (GitHub) has. The 8 required BUILD gates
# above are fully present; the governance gate is N/A here (no kit-shipped GitLab equivalent —
# adopter-owned). Wire it manually via a GitLab MR approval rule + CODEOWNERS scoped to the
# control-plane paths: see docs/operations/gitlab-adoption.md §"Control-plane ratification".
#
# HARDENING:
#  - Supply-chain tools are PINNED to the versions in `variables:` (not `latest`) AND
#    checksum-verified before exec: each install downloads the release's published
#    `*_checksums.txt` and runs `sha256sum -c` (fail-closed via `test -s`). This defeats a
#    moved tag, MITM, and the prior `curl … | sh`-from-`main` pattern. Honest ceiling: a
#    fully-compromised upstream release (binary + checksums both swapped) is the residual —
#    the next tier is upstream signing (keyless cosign verify of the checksums `.sig`). See
#    docs/operations/tool-supply-chain.md. Bump versions deliberately.
#  - Prefer the GitLab-native security templates named in the comments below at scale.
#  - OIDC (`id_tokens`) is least-privilege: SIGSTORE_ID_TOKEN is requested only by the
#    provenance job. On self-managed runners, wire keyless cosign to your IdP.

stages: [setup, verify, supply-chain]

variables:
  # Pinned supply-chain tool versions (HARDENING). Verify checksums for production.
  GITLEAKS_VERSION: "8.30.1"
  SYFT_VERSION: "1.45.1"
  COSIGN_VERSION: "3.1.1"

default:
  image: node:20-bookworm
  cache:
    key:
      files: [pnpm-lock.yaml]
    paths: [.pnpm-store]

# Setup is not a gate (matches the GitHub profile's gate-install being setup, not a gate).
gate-install:
  stage: setup
  script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  artifacts:
    paths: [node_modules/]
    expire_in: 1h

gate-lint:
  stage: verify
  needs: [gate-install]
  script: [pnpm run lint]

gate-type-check:
  stage: verify
  needs: [gate-install]
  script: [pnpm run type-check]

gate-test:
  stage: verify
  needs: [gate-install]
  script: [pnpm run test -- --coverage]
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'

# Build output (dist/) is published as an artifact so the supply-chain stage can attest the
# actual built bits — mirrors the GitHub profile uploading/downloading build-artifact/**.
gate-build:
  stage: verify
  needs: [gate-install]
  script: [pnpm run build]
  artifacts:
    paths: [dist/]
    expire_in: 1h

# Secret scan — gitleaks. GitLab-native alternative: include the Secret-Detection template
#   ( - template: Security/Secret-Detection.gitlab-ci.yml ) and name the job gate-secret-scan.
gate-secret-scan:
  stage: verify
  needs: []
  script:
    # Verified install: download the pinned release + its published checksums file, then
    # sha256sum -c before exec. `test -s` fails closed if the artifact line is absent (wrong
    # name/version) so a missing checksum never silently skips verification. See the honest
    # ceiling in docs/operations/tool-supply-chain.md.
    - |
      set -eu
      if ! command -v gitleaks >/dev/null 2>&1; then
        curl -sSfL -O "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        curl -sSfL -O "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
        grep "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz$" "gitleaks_${GITLEAKS_VERSION}_checksums.txt" > sha.txt
        test -s sha.txt
        sha256sum -c sha.txt
        tar -xz -C /usr/local/bin -f "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks
      fi
    - gitleaks detect --no-banner --redact

# Dependency vulnerability scan. GitLab-native alternative: the Dependency-Scanning template.
gate-dep-scan:
  stage: verify
  needs: [gate-install]
  script: [pnpm audit --prod --audit-level=high]   # prod-dep posture; dev-tool advisories triaged separately (they don't ship)

# SBOM (CycloneDX). GitLab-native alternative: the CycloneDX/Dependency-Scanning artifact.
gate-sbom:
  stage: supply-chain
  needs: [gate-build]
  script:
    # Verified install (replaces the prior `curl … | sh` from the install script on `main`, which
    # piped an unpinned, unverified script to a shell): download the pinned release + its published
    # checksums, sha256sum -c before exec. See docs/operations/tool-supply-chain.md.
    - |
      set -eu
      if ! command -v syft >/dev/null 2>&1; then
        curl -sSfL -O "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
        curl -sSfL -O "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt"
        grep "syft_${SYFT_VERSION}_linux_amd64.tar.gz$" "syft_${SYFT_VERSION}_checksums.txt" > sha.txt
        test -s sha.txt
        sha256sum -c sha.txt
        tar -xz -C /usr/local/bin -f "syft_${SYFT_VERSION}_linux_amd64.tar.gz" syft
      fi
    - syft dir:. -o cyclonedx-json=sbom.cdx.json
  artifacts:
    paths: [sbom.cdx.json]
    expire_in: 30 days

# Build provenance / attestation — keyless cosign (Sigstore). The id_tokens block requests a
# SIGSTORE_ID_TOKEN (OIDC); on GitLab.com this signs against the public Sigstore. This job
# FAILS RED if attestation fails — a provenance gate that self-certified on failure would be
# false assurance (the GitHub profile's attest-build-provenance fails the job too). On a
# self-managed runner, wire keyless cosign to your IdP (docs/operations/ci-platforms.md);
# until then this gate fails, which is the honest state: the artifact is NOT attested.

# Conditional eval gate (parity with the GitHub profile's gate-eval): runs ONLY when an evals/ dir is
# present (an AI feature). Mirrors profiles/typescript-node/ci.yml — green-on-clone when no evals/ yet.
gate-eval:
  stage: verify
  script:
    - |
      if [ -d evals ]; then
        corepack enable
        pnpm install --frozen-lockfile
        pnpm run eval   # scores against a rubric, exits non-zero below threshold
      else
        echo "no evals/ dir — skipping the eval gate (add one when your feature uses a model; see profiles/ml/evals for a reference)"
      fi

gate-provenance:
  stage: supply-chain
  needs: [gate-build, gate-sbom]
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    # Verified install: download the pinned cosign binary + its published checksums, sha256sum -c
    # before exec (two-space + end anchor matches the exact filename, never a .sig/.sbom sibling).
    # Honest ceiling (upstream-release compromise; keyless verify of the checksums .sig is the next
    # tier): docs/operations/tool-supply-chain.md.
    - |
      set -eu
      if ! command -v cosign >/dev/null 2>&1; then
        curl -sSfL -O "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64"
        curl -sSfL -O "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign_checksums.txt"
        grep "  cosign-linux-amd64$" cosign_checksums.txt > sha.txt
        test -s sha.txt
        sha256sum -c sha.txt
        install -m 0755 cosign-linux-amd64 /usr/local/bin/cosign
      fi
    - tar -czf build-artifact.tgz dist/          # single subject blob = the build output
    - cosign attest-blob --yes --type cyclonedx --predicate sbom.cdx.json --bundle provenance.bundle build-artifact.tgz
  artifacts:
    paths: [provenance.bundle, build-artifact.tgz]
    expire_in: 30 days
