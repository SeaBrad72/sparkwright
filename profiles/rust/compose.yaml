# Local dev mirroring prod (DEVELOPMENT-STANDARDS.md §13 dev/prod parity).
# COPY & ADAPT to your project root. The app builds from the same Dockerfile that ships.
#
# Default archetype: STATELESS service (a systems service / CLI — no backing store).
# If your service needs a database, add a `db` service + DATABASE_URL and a `depends_on`
# (see profiles/python/compose.yaml for a Postgres-backed example), and record it in your
# RUNBOOK's "Environments this stack needs". See profiles/rust.md and docs/STACK-SELECTION.md.
services:
  app:
    # Prod-parity by default (runs the shipped image). For hot-reload during dev,
    # add a source mount and a dev command (e.g. `cargo watch -x run`).
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
