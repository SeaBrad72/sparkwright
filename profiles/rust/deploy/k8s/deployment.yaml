# Reference k8s Deployment for the Rust profile. COPY & ADAPT.
# Image is referenced BY DIGEST (immutable) — the attested digest from CI.
# For HA production, also add: a startupProbe (slow-starting apps), a PodDisruptionBudget
# (minAvailable: 1), and topologySpreadConstraints (spread replicas across nodes).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-app
  labels:
    app: rust-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rust-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: rust-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532          # distroless 'nonroot'
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # Replace @sha256:... with the digest attested by CI (never a mutable tag).
          image: ghcr.io/ORG/REPO@sha256:REPLACE_WITH_ATTESTED_DIGEST
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true   # compiled binary writes nothing — safe
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
