# Scaffold app config.
#
# Route every unmapped path through the app's own JSON 404 (NotFoundAdvice) instead
# of the static-resource handler or the Whitelabel error page:
#  - add-mappings=false disables the default /** static resource handler, so an
#    unknown path is NOT swallowed by a ResourceHttpRequestHandler 404;
#  - throw-exception-if-no-handler-found=true makes the DispatcherServlet raise
#    NoHandlerFoundException, which NotFoundAdvice maps to {"error":"not found"}.
# Together this makes the contract's "anything else -> 404 {\"error\":\"not found\"}"
# hold for unknown GET paths, exactly like the go/python references' manual dispatch.
spring.web.resources.add-mappings=false
spring.mvc.throw-exception-if-no-handler-found=true

# Do NOT set server.server-header: Tomcat omits the Server header when it is unset,
# so SecurityAndTelemetryFilter is the SOLE source of `Server: reference-app` (stamped
# exactly once). Setting it here too would risk a duplicate Server header.
