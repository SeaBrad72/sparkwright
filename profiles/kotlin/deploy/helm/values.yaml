# Image referenced by digest (immutable, attested in CI).
image:
  repository: ghcr.io/ORG/REPO
  digest: "sha256:REPLACE_WITH_ATTESTED_DIGEST"
replicaCount: 2
service:
  port: 80
  targetPort: 8080
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "768Mi"
