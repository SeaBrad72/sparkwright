# Local dev mirroring prod (DEVELOPMENT-STANDARDS.md §13 dev/prod parity).
# COPY & ADAPT to your project root. The app builds from the same Dockerfile that ships.
services:
  app:
    # Prod-parity by default (runs the shipped image). For hot-reload during dev,
    # use `./gradlew bootRun` on the host against the compose db instead.
    build:
      context: .
      target: runtime
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/app
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
  # --- Agent sandbox (containment reference — docs/operations/containment.md §1) ---
  # Headless agent/dev shell, host UNREACHABLE: read-only root, ONLY the work tree mounted, all caps
  # dropped, no-new-privileges, no network. Opt-in; never auto-started. Run as the HOST uid so the
  # work-tree bind mount is writable under cap_drop:[ALL] (which strips DAC_OVERRIDE):
  #     HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose --profile agent run --rm agent
  agent:
    build:
      context: .
      target: builder
    profiles: [agent]
    read_only: true
    network_mode: none
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - ./:/work:rw
    working_dir: /work
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      HOME: /tmp
    command: ["bash"]
volumes:
  pgdata:
