# Reference CI pipeline for the C#/.NET profile.
# COPY & ADAPT: copy to your project's .github/workflows/ci.yml. Inert here in the kit.
# Each quality gate carries a standardized `id: gate-*` that conformance/ci-gates.sh asserts.
# Satisfies DEVELOPMENT-STANDARDS.md §14. (compile = type-check: gate-type-check=build, gate-build=publish)
# HARDENING: pin `uses:` to SHAs and tool versions for production.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies
        id: gate-install
        run: dotnet restore --locked-mode

      - name: Lint
        id: gate-lint
        run: dotnet format --verify-no-changes

      - name: Type-check
        id: gate-type-check
        run: dotnet build --no-restore -c Release

      - name: Test + coverage (>=80%)
        id: gate-test
        # coverlet.msbuild in the test project enforces the threshold (fails the build < 80%).
        run: dotnet test --no-build -c Release /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:Threshold=80 /p:ThresholdType=line

      - name: Build
        id: gate-build
        run: dotnet publish -c Release -o ./publish

      - name: Secret scan
        id: gate-secret-scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # required for org repos

      - name: Dependency vulnerability scan
        id: gate-dep-scan
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee audit.txt
          ! grep -q "Critical\|High\|Moderate" audit.txt

      - name: Generate SBOM (CycloneDX)
        id: gate-sbom
        run: |
          dotnet tool install --global CycloneDX
          dotnet CycloneDX *.sln -o . -F Json -fn sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Attest build provenance
        id: gate-provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ./publish/**
