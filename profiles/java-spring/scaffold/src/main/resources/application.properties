# App server spine configuration (java-spring profile).
#
# Routing: an unmatched path must raise NoHandlerFoundException (handled by NotFoundAdvice into a
# hardened JSON 404) rather than serving the whitelabel error page or a static-resource 404.
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Read-side bounds — slow-loris / unbounded-body defenses (parity with the go server's
# ReadHeaderTimeout / ReadTimeout / MaxHeaderBytes). AppInstrumentationFilter adds the request-id
# bound; these bound the socket read and body size at the connector.
server.tomcat.connection-timeout=15s
server.tomcat.max-http-request-header-size=8KB
server.tomcat.max-swallow-size=2MB

# Do not disclose the servlet container in errors (defense-in-depth; the filter also neutralizes the
# Server header to "reference-app").
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
