# Reference CI pipeline for the Java/Spring profile.
# COPY & ADAPT: copy to your project's .github/workflows/ci.yml. Inert here in the kit.
# Each quality gate carries a standardized `id: gate-*` that conformance/ci-gates.sh asserts.
# Satisfies DEVELOPMENT-STANDARDS.md §14. NOTE: compilation IS type-checking in Java, so
# gate-type-check = `mvn compile` and gate-build = `mvn package`.
#
# HARDENING (do before production):
#  - Pin every `uses:` to a full 40-char commit SHA (e.g. actions/checkout@<sha>  # v4.x).
#  - Pin tool installs to exact versions.
#  - OIDC is least-privilege here: id-token:write lives only on the push-only `provenance`
#    job, so PR-triggered steps cannot mint a token. Your cloud trust policy MUST restrict
#    `sub` to `repo:<org>/<repo>:ref:refs/heads/main` (never `pull_request`).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scanning

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Lint / format check
        id: gate-lint
        run: ./mvnw -q spotless:check checkstyle:check

      - name: Type-check (compile)
        id: gate-type-check
        run: ./mvnw -q compile

      - name: Test + coverage (JaCoCo >=80%)
        id: gate-test
        run: ./mvnw -q verify   # JaCoCo check binds to verify

      - name: Build
        id: gate-build
        run: ./mvnw -q -DskipTests package

      - name: Secret scan
        id: gate-secret-scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Organization-owned repos additionally require:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Dependency vulnerability scan (OWASP)
        id: gate-dep-scan
        run: ./mvnw -q org.owasp:dependency-check-maven:check

      - name: Generate SBOM (CycloneDX)
        id: gate-sbom
        run: ./mvnw -q org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: target/bom.json   # cyclonedx-maven-plugin default output (set <outputName> in pom.xml to change)

      - name: Upload build artifact (for provenance)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: target/*.jar          # the built jar
          if-no-files-found: error

  provenance:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # scoped to this push-only job (build-provenance attestation)
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: build-artifact
      - name: Attest build provenance
        id: gate-provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: build-artifact/**
