name: release-tag
# Auto-tag-on-merge: after a push to main (a merged PR), create+push v<VERSION> on the merge
# commit IF it doesn't already exist. Removes the human from release tagging (the 3x premature-tag
# fumble). Coherence is asserted INLINE by scripts/release-tag.sh (version-tag-coherent --require)
# before tagging; release-coherence.yml stays as the tag-push backstop.
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Auto-tag v<VERSION> on the merge commit (coherent, idempotent)
        run: sh scripts/release-tag.sh
