# Reference: GitHub binding for auto-tag-on-merge (OPT-IN). COPY this into your repo's
# .github/workflows/ to auto-tag v<VERSION> on every push to main. The kit itself does NOT run
# this — it tags manually with `sh scripts/release-tag.sh` after merge (see release-tag.md);
# this is provided for adopters who choose full automation. Pin actions to a full SHA in your repo.
name: release-tag
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Auto-tag v<VERSION> on the merge commit (coherent, idempotent)
        run: sh scripts/release-tag.sh
